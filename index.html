<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#050505">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<title>Life Tracker</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
:root{
  --bg:#050505;--card:#111;--card2:#161616;--card3:#1c1c1c;
  --border:#1a1a1a;--border2:#252525;
  --text:#e8e8e8;--text2:#bbb;--muted:#777;--dim:#444;
  --red:#ef4444;--green:#22c55e;--amber:#f59e0b;--blue:#3b82f6;
  --purple:#8b5cf6;--pink:#ec4899;--orange:#f97316;--teal:#14b8a6;
  --radius:14px;--radius-sm:10px;
  --safe-b:12px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text',system-ui,sans-serif;overflow-x:hidden;font-size:15px;line-height:1.4;-webkit-font-smoothing:antialiased}
body{max-width:500px;margin:0 auto}
input,button,select,textarea{font-family:inherit;-webkit-user-select:text;user-select:text}
textarea{-webkit-user-select:text;user-select:text}

/* ── Header ──────────────────────────────── */
.hdr{position:sticky;top:0;z-index:50;background:var(--bg);padding:10px 16px 0}
.hdr-top{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.tabs{display:flex;background:var(--card2);border-radius:var(--radius-sm);padding:3px;flex:1}
.tab{flex:1;padding:8px 0;border:none;border-radius:8px;background:transparent;color:var(--dim);font-size:12px;font-weight:700;cursor:pointer;text-align:center;letter-spacing:.3px;transition:all .2s}
.tab.on{background:#262626;color:#fff}
.streak-pill{display:flex;align-items:center;gap:3px;background:var(--card2);padding:5px 10px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap;color:var(--amber)}
.streak-pill .best{color:var(--dim);font-size:10px;margin-left:2px}

/* ── Day Nav ─────────────────────────────── */
.daynav{display:flex;align-items:center;justify-content:space-between;padding:0 16px;margin-bottom:10px}
.daynav button{width:44px;height:44px;border-radius:var(--radius-sm);border:none;background:var(--card2);color:var(--muted);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.daynav button:disabled{opacity:.2}
.day-label{text-align:center}
.day-label h2{font-size:17px;font-weight:700;letter-spacing:-.3px}
.day-label small{font-size:11px;color:var(--dim)}

/* ── Counters ────────────────────────────── */
.counters{display:flex;gap:6px;padding:0 16px;margin-bottom:10px}
.ctr{flex:1;text-align:center;background:var(--card);border-radius:var(--radius-sm);padding:8px 4px}
.ctr .n{font-size:20px;font-weight:800;letter-spacing:-.5px}
.ctr .n.zero{color:#262626}
.ctr .l{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.8px;margin-top:1px}

/* ── Progress Bars ───────────────────────── */
.progress{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:0 16px;margin-bottom:10px}
.prog-item{display:flex;align-items:center;gap:6px;background:var(--card);border-radius:8px;padding:6px 10px}
.prog-lbl{font-size:10px;color:var(--muted);min-width:38px}
.prog-val{font-size:11px;font-weight:700;min-width:32px;text-align:right}
.prog-bar{flex:1;height:4px;background:#1a1a1a;border-radius:2px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;transition:width .3s}

/* ── Missing Banner ──────────────────────── */
.missing-bar{margin:0 16px 10px;padding:10px 12px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.15);border-radius:var(--radius-sm)}
.missing-title{font-size:11px;color:var(--red);font-weight:600;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.missing-items{display:flex;gap:6px;flex-wrap:wrap}
.missing-chip{display:flex;align-items:center;gap:4px;background:var(--card2);border-radius:8px;padding:3px 4px 3px 10px;font-size:12px;color:var(--text2)}
.missing-chip button{width:32px;height:32px;border:none;border-radius:6px;background:var(--card3);color:var(--muted);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* ── Button Grid ─────────────────────────── */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 16px;margin-bottom:14px}
.gbtn{display:flex;align-items:center;justify-content:center;gap:6px;padding:14px 8px;border-radius:var(--radius);border:1px solid #1e1e1e;background:var(--card);color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;transition:transform .1s;min-height:48px}
.gbtn:active{transform:scale(.95)}

/* ── Timeline ────────────────────────────── */
.tl{padding:0 16px;margin-bottom:16px}
.tl-label{font-size:10px;color:var(--dim);font-weight:700;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:8px}
.tl-empty{text-align:center;padding:40px 20px;color:#222;font-size:14px}
.entry{display:flex;gap:10px;padding:12px 0;border-bottom:1px solid var(--border);align-items:flex-start}
.entry .time{font-size:12px;color:var(--muted);min-width:42px;font-variant-numeric:tabular-nums;font-weight:600;padding-top:2px}
.entry .body{flex:1;min-width:0}
.entry .tag{font-size:11px;font-weight:700;padding:3px 9px;border-radius:6px;display:inline-block}
.entry .det{font-size:13px;color:#999;margin-top:3px;line-height:1.3}
.entry .dur{font-size:11px;color:var(--dim);margin-top:2px}
.entry .scales{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}
.entry .sc{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:600}
.entry .acts{display:flex;gap:4px;align-items:center;padding-top:2px}
.entry .acts button{width:36px;height:36px;border:none;border-radius:8px;background:transparent;color:#333;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.entry .acts button:hover{color:var(--muted)}

/* ── Day Note ────────────────────────────── */
.day-note{margin:0 16px 16px;padding:14px;background:var(--card);border-radius:var(--radius)}
.day-note label{font-size:11px;color:var(--dim);font-weight:600;display:block;margin-bottom:6px}
.day-note textarea{width:100%;padding:10px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--card2);color:var(--text);font-size:14px;resize:vertical;min-height:60px;line-height:1.4}
.day-note .saved{font-size:10px;color:var(--green);margin-top:4px;opacity:0;transition:opacity .3s}
.day-note .saved.show{opacity:1}

/* ── Stats ────────────────────────────────── */
.stats-list{padding:0 16px}
.stat-day{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;margin-bottom:6px;background:var(--card);border-radius:var(--radius-sm);cursor:pointer;color:var(--text2);width:100%;border:none;text-align:left;font-family:inherit}
.stat-day:active{background:var(--card2)}
.stat-day .info{flex:1}
.stat-day .info .day{font-size:14px;font-weight:700}
.stat-day .info .sub{font-size:11px;color:var(--dim)}
.stat-day .pills{display:flex;gap:6px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
.stat-day .pill{font-size:11px;font-weight:600;padding:2px 7px;border-radius:6px}
.stat-day .score{font-size:15px;font-weight:800;min-width:40px;text-align:right}
.stat-day .score-bar{width:50px;height:4px;background:#1a1a1a;border-radius:2px;margin-top:2px}
.stat-day .score-fill{height:4px;border-radius:2px}

/* ── Goals ────────────────────────────────── */
.goals-page{padding:0 16px}
.active-goal{background:linear-gradient(135deg,#1a1a2e,#16213e);border:1px solid #243b55;border-radius:var(--radius);padding:20px;margin-bottom:16px}
.active-goal .label{font-size:10px;color:var(--blue);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.active-goal .text{font-size:18px;font-weight:700;line-height:1.3}
.active-goal .meta{font-size:11px;color:var(--muted);margin-top:8px}
.no-goal{text-align:center;padding:24px;color:#333;font-size:14px}
.goal-ideas{margin-top:8px}
.goal-ideas .gi-title{font-size:10px;color:var(--dim);font-weight:700;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:8px}
.goal-input{display:flex;gap:8px;margin-bottom:12px}
.goal-input input{flex:1;padding:12px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--card2);color:var(--text);font-size:14px}
.goal-input button{padding:0 20px;border-radius:var(--radius-sm);border:none;background:var(--blue);color:#fff;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap}
.gi-card{display:flex;align-items:center;gap:10px;padding:12px;background:var(--card);border-radius:var(--radius-sm);margin-bottom:6px}
.gi-card .gi-text{flex:1;font-size:14px}
.gi-card .gi-date{font-size:10px;color:var(--dim)}
.gi-card button{width:36px;height:36px;border:none;border-radius:8px;color:var(--muted);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.gi-card .gi-activate{background:rgba(59,130,246,.15);color:var(--blue)}
.gi-card .gi-done{background:rgba(34,197,94,.15);color:var(--green)}
.gi-card .gi-del{background:transparent;color:#333}
.goal-history{margin-top:20px}
.goal-history .gh-item{padding:10px 12px;background:var(--card);border-radius:8px;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center}
.goal-history .gh-text{font-size:13px;color:var(--muted)}
.goal-history .gh-badge{font-size:10px;padding:2px 8px;border-radius:4px;font-weight:600}

/* ── Settings ────────────────────────────── */
.settings{padding:0 16px}
.s-section{margin-bottom:24px}
.s-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.s-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0}
.s-label{color:var(--text2);font-size:14px}
.s-input{width:80px;text-align:center;padding:8px;border-radius:8px;border:1px solid var(--border2);background:var(--card2);color:var(--text);font-size:14px}
.s-input-time{width:90px}
.s-hint{font-size:11px;color:var(--dim);margin-top:-4px;margin-bottom:8px}
.s-btn{width:100%;padding:14px;border-radius:var(--radius);border:none;font-size:15px;font-weight:700;cursor:pointer}

/* ── Floating Quick Bar ──────────────────── */
.quickbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:500px;z-index:40;padding:8px 16px calc(8px + var(--safe-b));background:linear-gradient(to top,var(--bg) 70%,transparent);display:flex;gap:8px;justify-content:center}
.qb-btn{flex:1;max-width:90px;height:52px;border-radius:var(--radius);border:none;font-size:22px;font-weight:700;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;transition:transform .1s;position:relative}
.qb-btn:active{transform:scale(.9)}
.qb-btn .qb-count{font-size:9px;font-weight:800;letter-spacing:.5px}
.qb-btn.cig{background:rgba(239,68,68,.2);color:var(--red)}
.qb-btn.joint{background:rgba(34,197,94,.2);color:var(--green)}
.qb-btn.alc{background:rgba(249,115,22,.2);color:var(--orange)}
.qb-btn.water{background:rgba(59,130,246,.2);color:var(--blue)}

/* ── Batch Popover ───────────────────────── */
.batch-pop{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);width:280px;background:var(--card);border:1px solid var(--border2);border-radius:var(--radius);padding:16px;z-index:60;box-shadow:0 -4px 30px rgba(0,0,0,.6)}
.batch-pop h3{font-size:14px;font-weight:700;margin-bottom:12px;text-align:center}
.batch-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.batch-row label{font-size:13px;color:var(--muted)}
.batch-stepper{display:flex;align-items:center;gap:8px}
.batch-stepper button{width:40px;height:40px;border-radius:8px;border:none;background:var(--card3);color:var(--text);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.batch-stepper span{font-size:18px;font-weight:700;min-width:30px;text-align:center}
.batch-submit{width:100%;padding:12px;border-radius:var(--radius-sm);border:none;color:#fff;font-size:14px;font-weight:700;cursor:pointer;margin-top:4px}
.batch-overlay{position:fixed;inset:0;z-index:55;background:rgba(0,0,0,.5)}

/* ── Toast ────────────────────────────────── */
.toast{position:fixed;top:12px;left:50%;transform:translateX(-50%) translateY(-100px);z-index:80;background:var(--card2);border:1px solid var(--border2);border-radius:var(--radius);padding:10px 16px;display:flex;align-items:center;gap:10px;font-size:13px;font-weight:600;transition:transform .3s cubic-bezier(.4,0,.2,1);white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast button{padding:4px 12px;border-radius:6px;border:none;background:var(--red);color:#fff;font-size:12px;font-weight:700;cursor:pointer}

/* ── Modal ────────────────────────────────── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:flex-end;justify-content:center;z-index:70}
.modal{background:#111;border-radius:20px 20px 0 0;width:100%;max-width:500px;max-height:85vh;overflow-y:auto;padding:20px 20px calc(28px + var(--safe-b))}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-head .title{font-size:17px;font-weight:700}
.modal-head button{width:36px;height:36px;border-radius:var(--radius-sm);background:var(--card2);border:none;color:var(--muted);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.field{margin-bottom:14px}
.field label{font-size:11px;color:var(--dim);font-weight:600;display:block;margin-bottom:5px}
.field input,.field textarea,.field select{width:100%;padding:10px 12px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--card2);color:var(--text);font-size:14px}

/* ── Custom Time Picker ──────────────────── */
.time-pick{display:flex;align-items:center;justify-content:center;gap:6px}
.time-col{display:flex;flex-direction:column;align-items:center;gap:4px}
.time-col button{width:56px;height:48px;border-radius:var(--radius-sm);border:none;background:var(--card3);color:var(--muted);font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.time-col button:active{background:var(--border2)}
.time-col .val{font-size:28px;font-weight:800;min-width:56px;text-align:center;font-variant-numeric:tabular-nums;padding:4px 0}
.time-sep{font-size:28px;font-weight:800;color:var(--dim);padding-bottom:4px}

/* ── Mood Scales ─────────────────────────── */
.scale{margin-bottom:10px}
.scale .row{display:flex;justify-content:space-between;font-size:10px;color:var(--dim);margin-bottom:4px}
.scale .row .name{font-weight:700;color:var(--muted)}
.scale .btns{display:flex;gap:6px;justify-content:center}
.scale .btns button{width:48px;height:48px;border-radius:var(--radius-sm);border:none;font-size:17px;font-weight:800;cursor:pointer;transition:all .12s}
.submit-btn{width:100%;padding:16px;border-radius:var(--radius);border:none;color:#fff;font-size:16px;font-weight:700;cursor:pointer;margin-top:6px}
details{margin-bottom:8px}
summary{font-size:12px;color:var(--dim);cursor:pointer;margin-bottom:8px;font-weight:600}

/* ── Mood Dots ───────────────────────────── */
.mood-dots{display:flex;gap:4px;padding:0 16px;margin-bottom:10px;flex-wrap:wrap}
.mood-dot{width:26px;height:26px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff}

/* ── Fill Missing Modal ──────────────────── */
.fm-item{display:flex;align-items:center;gap:8px;margin-bottom:8px;background:var(--card2);padding:10px;border-radius:var(--radius-sm)}
.fm-item input[type=checkbox]{width:20px;height:20px}
.fm-item .fm-name{flex:1;font-size:13px;font-weight:600}
.fm-time-pick{transform:scale(.7);transform-origin:right center}

/* ── Swipe Area ──────────────────────────── */
.swipe-area{touch-action:pan-y;padding-bottom:calc(70px + var(--safe-b))}

/* ── Scrollbar ───────────────────────────── */
::-webkit-scrollbar{width:0;height:0}

/* ── Checkbox ────────────────────────────── */
input[type=checkbox]{accent-color:var(--blue)}

@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.anim-in{animation:fadeIn .25s ease-out}
</style>
</head>
<body>

<div id="app"></div>
<div id="toast" class="toast"></div>

<script>
// ═══════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════
const TYPES = [
  {id:'cig',label:'🚬 Cigarette',emoji:'🚬',color:'#ef4444',cat:'smoke',quick:true},
  {id:'joint',label:'🌿 Joint',emoji:'🌿',color:'#22c55e',cat:'smoke',quick:true},
  {id:'alcohol',label:'🍺 Alcohol',emoji:'🍺',color:'#f97316',cat:'health',quick:true},
  {id:'water',label:'💧 Water',emoji:'💧',color:'#3b82f6',cat:'health',quick:true},
  {id:'wakeup',label:'☀️ Wake Up',emoji:'☀️',color:'#fbbf24',cat:'sleep'},
  {id:'getup',label:'🛏️ Get Up',emoji:'🛏️',color:'#fb923c',cat:'sleep'},
  {id:'breakfast',label:'🍳 Breakfast',emoji:'🍳',color:'#f59e0b',cat:'meal'},
  {id:'lunch',label:'🍽️ Lunch',emoji:'🍽️',color:'#f59e0b',cat:'meal'},
  {id:'dinner',label:'🌙 Dinner',emoji:'🌙',color:'#f59e0b',cat:'meal'},
  {id:'snack',label:'🍿 Snack',emoji:'🍿',color:'#f59e0b',cat:'meal'},
  {id:'gaming',label:'🎮 Gaming',emoji:'🎮',color:'#8b5cf6',cat:'activity'},
  {id:'exercise',label:'💪 Exercise',emoji:'💪',color:'#10b981',cat:'activity'},
  {id:'work',label:'📚 Work/Study',emoji:'📚',color:'#6366f1',cat:'activity'},
  {id:'mood',label:'🧠 Mood Check',emoji:'🧠',color:'#ec4899',cat:'mood'},
  {id:'bedtime',label:'😴 Bedtime',emoji:'😴',color:'#6b7280',cat:'sleep'},
  {id:'note',label:'📝 Note',emoji:'📝',color:'#78716c',cat:'other'},
  {id:'social',label:'👥 Social',emoji:'👥',color:'#8b5cf6',cat:'social'},
  {id:'shower',label:'🚿 Shower',emoji:'🚿',color:'#3b82f6',cat:'health'},
  {id:'migraine',label:'🤕 Migraine',emoji:'🤕',color:'#a855f7',cat:'health'},
];
const SCALES = [
  {key:'mood',label:'Mood',low:'terrible',high:'great'},
  {key:'energy',label:'Energy',low:'dead',high:'wired'},
  {key:'stress',label:'Stress',low:'stressed',high:'calm'},
  {key:'irritability',label:'Irritab.',low:'annoyed',high:'zen'},
  {key:'rumination',label:'Spiraling',low:'looping',high:'clear'},
];
const MOOD_TYPES = new Set(['mood','wakeup','getup','bedtime','social','alcohol']);
const DUR_TYPES = new Set(['gaming','exercise','work']);
const DAY_START_HOUR = 5;
const ESSENTIAL_TYPES = ['wakeup','getup','bedtime','breakfast','lunch','dinner','water'];
const CONSTANT_TIME_TYPES = new Set(['wakeup','getup','bedtime','breakfast','lunch','dinner']);
const QUICK_IDS = ['cig','joint','alcohol','water'];

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
const pad = n => String(n).padStart(2,'0');
const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const typeOf = id => TYPES.find(t=>t.id===id) || TYPES.find(t=>t.id==='note');
const esc = s => s ? s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : '';

function getDayFromDate(date) {
  const d = new Date(date);
  if (d.getHours() < DAY_START_HOUR) d.setDate(d.getDate()-1);
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
const today = () => getDayFromDate(new Date());
const fmtTime = ts => { const d=new Date(ts); return `${pad(d.getHours())}:${pad(d.getMinutes())}`; };
function fmtDay(s) {
  const d=new Date(s+'T12:00:00');
  const dn=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const mn=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${dn[d.getDay()]} ${d.getDate()} ${mn[d.getMonth()]}`;
}
function offsetDay(s,n) {
  const d=new Date(s+'T12:00:00');
  d.setDate(d.getDate()+n);
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function hasEntryOrSkip(entries,typeId) {
  return entries.some(e=>e.type===typeId) || entries.some(e=>e.type==='note'&&e.details&&e.details.includes(`skipped: ${typeId}`));
}
function countMissing(entries) {
  let n=0; ESSENTIAL_TYPES.forEach(t=>{if(!hasEntryOrSkip(entries,t))n++;}); return n;
}

// Median time for fill-missing only
async function getMedianTime(typeId) {
  if(!CONSTANT_TIME_TYPES.has(typeId)) return null;
  const all = await dbGetAll();
  const cutoff = Date.now() - 14*86400000;
  let rel = all.filter(e=>e.type===typeId && e.ts>=cutoff);
  if(!rel.length) rel = all.filter(e=>e.type===typeId);
  if(!rel.length) return null;
  const mins = rel.map(e=>{const d=new Date(e.ts);return d.getHours()*60+d.getMinutes();}).sort((a,b)=>a-b);
  const med = mins[Math.floor(mins.length/2)];
  return {h:Math.floor(med/60),m:med%60};
}

// Score
function computeScore(entries,targets){
  let pts=0,tot=0;
  const cigs=entries.filter(e=>e.type==='cig').length;
  const joints=entries.filter(e=>e.type==='joint').length;
  const alc=entries.filter(e=>e.type==='alcohol').length;
  const water=entries.filter(e=>e.type==='water').length;
  if(targets.cigLimit!=null){tot++;if(cigs<=targets.cigLimit)pts++;}
  if(targets.jointLimit!=null){tot++;if(joints<=targets.jointLimit)pts++;}
  if(targets.alcoholLimit!=null){tot++;if(alc<=targets.alcoholLimit)pts++;}
  if(targets.waterTarget!=null){tot++;if(water>=targets.waterTarget)pts++;}
  function checkTime(typeId,target){
    const e=entries.find(x=>x.type===typeId);
    if(target){
      tot++;
      if(e){const[th,tm]=target.split(':').map(Number);const d=new Date(e.ts);if(d.getHours()*60+d.getMinutes()<=th*60+tm)pts++;}
    }
  }
  checkTime('wakeup',targets.wakeupTarget);
  checkTime('getup',targets.getupTarget);
  checkTime('bedtime',targets.bedtimeTarget);
  let mc=0;if(entries.some(e=>e.type==='lunch'))mc++;if(entries.some(e=>e.type==='dinner'))mc++;
  if(targets.includeBreakfast&&entries.some(e=>e.type==='breakfast'))mc++;
  if(targets.mealsTarget!=null){tot++;if(mc>=targets.mealsTarget)pts++;}
  return tot===0?0:Math.round(pts/tot*100);
}

// Streak
async function computeStreak(){
  const allDays=await dbGetAllDays();const t=today();
  if(!allDays.includes(t))allDays.unshift(t);
  allDays.sort().reverse();
  let cur=0,best=0,broken=false;
  for(const day of allDays){
    const entries=await dbGetDay(day);
    const ok=countMissing(entries)===0;
    if(!broken&&ok)cur++;else broken=true;
  }
  let run=0;
  for(const day of allDays){
    const entries=await dbGetDay(day);
    if(countMissing(entries)===0){run++;if(run>best)best=run;}else run=0;
  }
  return{current:cur,best};
}

// Import CSV
// Build reverse map: display name → type id
const TYPE_NAME_MAP = {};
TYPES.forEach(t => {
  const name = t.label.replace(/^[^\w\s]+\s/, '').toLowerCase().trim();
  TYPE_NAME_MAP[name] = t.id;
});
// Also add common aliases
TYPE_NAME_MAP['cig'] = 'cig';
TYPE_NAME_MAP['cigarette'] = 'cig';
TYPE_NAME_MAP['wake up'] = 'wakeup';
TYPE_NAME_MAP['get up'] = 'getup';
TYPE_NAME_MAP['mood check'] = 'mood';
TYPE_NAME_MAP['work/study'] = 'work';

async function importCSV(input) {
  const file = input.files[0];
  if (!file) return;
  const text = await file.text();
  input.value = ''; // reset so same file can be re-imported
  
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  if (lines.length < 2) { alert('CSV is empty or has no data rows.'); return; }
  
  // Detect header
  const hdr = lines[0].toLowerCase();
  const hasHeader = hdr.includes('date') || hdr.includes('type') || hdr.includes('time');
  const dataLines = hasHeader ? lines.slice(1) : lines;
  
  // Load existing entries for dedup
  const existing = await dbGetAll('entries');
  const existingKeys = new Set(existing.map(e => `${e.day}_${fmtTime(e.ts)}_${e.type}`));
  
  let imported = 0, skipped = 0, errors = 0;
  
  for (const line of dataLines) {
    try {
      // Parse semicolon-separated, handling quoted fields
      const fields = parseCSVLine(line, ';');
      if (fields.length < 3) { errors++; continue; }
      
      const [dateStr, timeStr, typeName, ...rest] = fields;
      
      // Parse date: DD/MM/YYYY
      const dateParts = dateStr.trim().split('/');
      if (dateParts.length !== 3) { errors++; continue; }
      const [dd, mm, yyyy] = dateParts.map(Number);
      
      // Parse time: HH:MM
      const timeParts = timeStr.trim().split(':');
      if (timeParts.length < 2) { errors++; continue; }
      const [hh, mi] = timeParts.map(Number);
      
      // Resolve type
      const typeKey = typeName.replace(/"/g, '').trim().toLowerCase();
      const typeId = TYPE_NAME_MAP[typeKey];
      if (!typeId) { errors++; continue; }
      
      // Build timestamp
      const d = new Date(yyyy, mm - 1, dd, hh, mi, 0, 0);
      if (isNaN(d.getTime())) { errors++; continue; }
      const day = getDayFromDate(d);
      const ts = d.getTime();
      
      // Dedup check
      const key = `${day}_${pad(hh)}:${pad(mi)}_${typeId}`;
      if (existingKeys.has(key)) { skipped++; continue; }
      
      // Parse optional fields
      const details = (rest[0] || '').replace(/^"|"$/g, '').replace(/""/g, '"').trim();
      const duration = rest[1] ? parseInt(rest[1]) || null : null;
      const mood = rest[2] ? parseInt(rest[2]) || null : null;
      const energy = rest[3] ? parseInt(rest[3]) || null : null;
      const stress = rest[4] ? parseInt(rest[4]) || null : null;
      const irritability = rest[5] ? parseInt(rest[5]) || null : null;
      const rumination = rest[6] ? parseInt(rest[6]) || null : null;
      
      const entry = { id: uid(), type: typeId, ts, day, details: details || '', duration };
      if (mood) entry.mood = mood;
      if (energy) entry.energy = energy;
      if (stress) entry.stress = stress;
      if (irritability) entry.irritability = irritability;
      if (rumination) entry.rumination = rumination;
      
      await dbPut('entries', entry);
      existingKeys.add(key);
      imported++;
    } catch (e) {
      errors++;
    }
  }
  
  await refreshAll();
  alert(`Import done!\n✓ ${imported} entries added\n⏭ ${skipped} duplicates skipped${errors ? `\n⚠ ${errors} rows had errors` : ''}`);
}

// Parse a CSV line respecting quoted fields
function parseCSVLine(line, sep) {
  const fields = [];
  let current = '';
  let inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (inQuotes) {
      if (ch === '"' && line[i + 1] === '"') { current += '"'; i++; }
      else if (ch === '"') { inQuotes = false; }
      else { current += ch; }
    } else {
      if (ch === '"') { inQuotes = true; }
      else if (ch === sep) { fields.push(current); current = ''; }
      else { current += ch; }
    }
  }
  fields.push(current);
  return fields;
}

// NTFY.SH NOTIFICATIONS
// ═══════════════════════════════════════════
// Schedules notifications for the next 3 days via ntfy.sh
// User subscribes to their topic in the ntfy iOS app

async function syncNotifications(){
  const t=S.targets;
  if(!t.ntfyTopic||!t.ntfyEnabled)return;
  const topic=t.ntfyTopic.trim();
  if(!topic)return;
  
  try{
    // Collect all reminder times and their messages
    const reminders=[];
    const ag=S.activeGoal;
    if(ag&&ag.status==='active'){
      if(t.goalReminder1)reminders.push({time:t.goalReminder1,title:'🎯 Weekly Goal',msg:ag.text,tag:'goal1'});
      if(t.goalReminder2)reminders.push({time:t.goalReminder2,title:'🎯 Weekly Goal',msg:ag.text,tag:'goal2'});
    }
    if(t.dailyLogReminder)reminders.push({time:t.dailyLogReminder,title:'📊 Life Tracker',msg:"Don't forget to log your day!",tag:'daily'});
    
    // Schedule for next 3 days
    const now=new Date();
    for(const rem of reminders){
      const[rh,rm]=rem.time.split(':').map(Number);
      for(let d=0;d<3;d++){
        const target=new Date(now);
        target.setDate(target.getDate()+d);
        target.setHours(rh,rm,0,0);
        // Skip if in the past
        if(target<=now)continue;
        const unixTs=Math.floor(target.getTime()/1000);
        // Fire and forget — ntfy deduplicates by tag+timestamp
        fetch(`https://ntfy.sh/${encodeURIComponent(topic)}`,{
          method:'POST',
          headers:{
            'Title':rem.title,
            'Tags':rem.tag,
            'At':String(unixTs),
            'Priority':'3',
          },
          body:rem.msg
        }).catch(()=>{});
      }
    }
    // Store last sync time
    localStorage.setItem('lt_lastNtfySync',Date.now().toString());
  }catch(e){console.warn('ntfy sync failed:',e);}
}

function getNtfySyncStatus(){
  const last=localStorage.getItem('lt_lastNtfySync');
  if(!last)return 'Never synced';
  const ago=Date.now()-parseInt(last);
  if(ago<60000)return 'Synced just now';
  if(ago<3600000)return `Synced ${Math.floor(ago/60000)}m ago`;
  if(ago<86400000)return `Synced ${Math.floor(ago/3600000)}h ago`;
  return `Synced ${Math.floor(ago/86400000)}d ago — open app to refresh`;
}

// Auto-sync on app open
function autoSyncNotifications(){
  const last=parseInt(localStorage.getItem('lt_lastNtfySync')||'0');
  // Re-sync if last sync was >12h ago
  if(Date.now()-last>12*3600000)syncNotifications();
}

// ═══════════════════════════════════════════
// SWIPE NAVIGATION
// ═══════════════════════════════════════════
let touchStartX=0,touchStartY=0,swiping=false;
document.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;touchStartY=e.touches[0].clientY;swiping=false;},{passive:true});
document.addEventListener('touchmove',e=>{
  if(S.showForm||S.showBatch||S.showFill)return;
  const dx=e.touches[0].clientX-touchStartX;
  const dy=e.touches[0].clientY-touchStartY;
  if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>30)swiping=true;
},{passive:true});
document.addEventListener('touchend',e=>{
  if(!swiping||S.showForm||S.showBatch||S.showFill)return;
  const dx=e.changedTouches[0].clientX-touchStartX;
  if(S.view==='log'||S.view==='stats'){
    if(dx>60)switchDay(offsetDay(S.selDay,-1));
    else if(dx<-60&&S.selDay!==today())switchDay(offsetDay(S.selDay,1));
  }
  swiping=false;
},{passive:true});

// Long press for batch
let longTimer=null;
function onQBDown(typeId,e){
  e.preventDefault();
  longTimer=setTimeout(()=>{openBatch(typeId);longTimer=null;},500);
}
function onQBUp(typeId,e){
  e.preventDefault();
  if(longTimer){clearTimeout(longTimer);longTimer=null;quickLog(typeId);}
}

    const alcPct=targets.alcoholLimit?Math.min(100,Math.round(alc/targets.alcoholLimit*100)):0;

  // ═══════════════ GOALS VIEW ═══════════════
  else if(view==='goals'){

    if(S.formType==='migraine'){
      h+=`<div class="field"><label>Intensity</label><div style="display:flex;gap:8px;justify-content:center">${[1,2,3,4,5].map(n=>{const on=S.migraineInt===n;return`<button style="width:52px;height:52px;border-radius:10px;border:none;font-size:18px;font-weight:800;cursor:pointer;background:${on?(n<=2?'#ef4444':n===3?'#f59e0b':'#22c55e'):'#1a1a1a'};color:${on?'#fff':'#444'};transform:scale(${on?1.1:1})" onclick="S.migraineInt=${S.migraineInt===n?0:n};render()">${n}</button>`;}).join('')}</div></div>`;
    } else if(needsMood){h+=renderScales();}
    else{h+=`<details><summary>+ Mood ratings</summary>${renderScales()}</details>`;}
    h+=`<button class="submit-btn" style="background:${t.color}" onclick="submitForm()">Save</button></div></div>`;
  }

  // Batch popover
  if(S.showBatch){
    const t=typeOf(S.batchType);
    h+=`<div class="batch-overlay" onclick="setState({showBatch:false})"></div>
    <div class="batch-pop"><h3>${t.emoji} Batch ${t.label}</h3>
      <div class="batch-row"><label>Count</label><div class="batch-stepper">
        <button onclick="S.batchCount=Math.max(1,S.batchCount-1);render()">−</button>
        <span>${S.batchCount}</span>
        <button onclick="S.batchCount++;render()">+</button>
      </div></div>
      <div class="batch-row"><label>From</label>${renderTimePicker('batchFromH','batchFromM','sm')}</div>
      <div class="batch-row"><label>To</label>${renderTimePicker('batchToH','batchToM','sm')}</div>
      <button class="batch-submit" style="background:${t.color}" onclick="submitBatch()">Log ${S.batchCount} ${t.label.split(' ').pop()}s</button>
    </div>`;
  }

  // Fill missing
  if(S.showFill){
    h+=`<div class="modal-bg" onclick="if(event.target===this)setState({showFill:false})"><div class="modal">
      <div class="modal-head"><span class="title">Fill Missing</span><button onclick="setState({showFill:false})">×</button></div>`;
    S.fillItems.forEach((item,idx)=>{
      const t=typeOf(item.typeId);
      h+=`<div class="fm-item">
        <input type="checkbox" ${item.selected?'checked':''} onchange="S.fillItems[${idx}].selected=this.checked">
        <span class="fm-name" style="color:${t.color}">${t.label}</span>
        ${renderTimePicker(`fillItems[${idx}].h`,`fillItems[${idx}].m`,'sm')}
      </div>`;
    });
    h+=`<div style="display:flex;gap:8px;margin-top:16px">
      <button class="submit-btn" style="background:var(--blue);flex:1" onclick="submitFill()">Add selected</button>
      <button class="submit-btn" style="background:var(--card3);flex:1;color:var(--muted)" onclick="setState({showFill:false})">Cancel</button>
    </div></div></div>`;
  }

  document.getElementById('app').innerHTML=h;

  // Focus details on form open
  if(S.showForm){const el=document.getElementById('f-det');if(el)setTimeout(()=>el.focus(),100);}

  // (ntfy status is rendered inline, no async check needed)

  // Load cache for stats view
  if(view==='stats'){allDays.slice(0,30).forEach(d=>{if(!S.cache[d])dbGetDay(d).then(entries=>{S.cache[d]=entries;render();});});}
}

// ── Custom Time Picker ──────────────────
function renderTimePicker(hKey,mKey,size){
  // Resolve the value from state using dot notation
  const hVal = resolveState(hKey);
  const mVal = resolveState(mKey);
  const s = size==='sm';
  const bw = s?40:56;
  const bh = s?36:48;
  const fs = s?20:28;
  const bfs = s?18:24;
  return `<div class="time-pick">
    <div class="time-col">
      <button style="width:${bw}px;height:${bh}px;font-size:${bfs}px;border-radius:8px;border:none;background:var(--card3);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center" onclick="adjTime('${hKey}',1,23)">▲</button>
      <div class="val" style="font-size:${fs}px">${pad(hVal)}</div>
      <button style="width:${bw}px;height:${bh}px;font-size:${bfs}px;border-radius:8px;border:none;background:var(--card3);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center" onclick="adjTime('${hKey}',-1,23)">▼</button>
    </div>
    <span class="time-sep" style="font-size:${fs}px">:</span>
    <div class="time-col">
      <button style="width:${bw}px;height:${bh}px;font-size:${bfs}px;border-radius:8px;border:none;background:var(--card3);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center" onclick="adjTime('${mKey}',5,59)">▲</button>
      <div class="val" style="font-size:${fs}px">${pad(mVal)}</div>
      <button style="width:${bw}px;height:${bh}px;font-size:${bfs}px;border-radius:8px;border:none;background:var(--card3);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center" onclick="adjTime('${mKey}',-5,59)">▼</button>
    </div>
  </div>`;
}

function resolveState(path){
  const parts=path.replace(/\[(\d+)\]/g,'.$1').split('.');
  let v=S;
  for(const p of parts)v=v[p];
  return v;
}
function setStatePath(path,val){
  const parts=path.replace(/\[(\d+)\]/g,'.$1').split('.');
  let v=S;
  for(let i=0;i<parts.length-1;i++)v=v[parts[i]];
  v[parts[parts.length-1]]=val;
}
function adjTime(path,delta,max){
  let v=resolveState(path)+delta;
  if(v>max)v=0;if(v<0)v=max-(max===59?4:0);
  // Round minutes to 5
  if(max===59)v=Math.round(v/5)*5;
  if(v>59)v=0;if(v<0)v=55;
  setStatePath(path,v);
  render();
}

function renderScales(){
  let h='';
  SCALES.forEach(s=>{
    const val=S.formMood[s.key]||0;
    h+=`<div class="scale"><div class="row"><span>${s.low}</span><span class="name">${s.label}</span><span>${s.high}</span></div>
    <div class="btns">${[1,2,3,4,5].map(n=>{
      const on=val===n;const bg=on?(n<=2?'#ef4444':n===3?'#f59e0b':'#22c55e'):'#1a1a1a';
      return`<button style="background:${bg};color:${on?'#fff':'#444'};transform:scale(${on?1.1:1})" onclick="S.formMood.${s.key}=${val===n?0:n};render()">${n}</button>`;
    }).join('')}</div></div>`;
  });
  return h;
}
